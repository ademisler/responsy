name: Bug report
description: Report a broken flow, UI problem, or packaging issue
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly.
      placeholder: The preview panel stops responding after switching from phone to desktop mode.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest reliable reproduction.
      placeholder: |
        1. Open the app
        2. Load a URL
        3. Switch viewport
        4. Observe the problem
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, build type, and app version.
      placeholder: macOS 15, local build from main, Responsy 1.0.0
    validations:
      required: true
